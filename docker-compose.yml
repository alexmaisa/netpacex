version: '3.8'

services:
  netpacex:
    build: .
    container_name: netpacex
    ports:
      - "8080:8080"
    environment:
      - TZ=${TZ:-Asia/Jakarta}
      - APP_PASSWORD=${APP_PASSWORD:-}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
