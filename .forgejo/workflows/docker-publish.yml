name: Docker Build and Publish (Forgejo)

on:
  release:
    types: [ published ]
  workflow_dispatch:

env:
  REGISTRY: repo.alexmaisa.my.id
  # Forgejo Actions specific compatibility
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    name: Build and Publish NetPaceX
    runs-on: docker
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ env.FORGEJO_GLOBAL_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/alexmaisa/netpacex
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'release' || endsWith(github.ref, 'main') }}
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/alexmaisa/netpacex:latest
          cache-to: type=inline
